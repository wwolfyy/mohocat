<!-- Simple SVG placeholder for videos when thumbnail fails to load -->
<svg width="320" height="180" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="180" fill="#f3f4f6"/>
  <circle cx="160" cy="90" r="30" fill="#6b7280"/>
  <polygon points="150,80 150,100 170,90" fill="white"/>
  <text x="160" y="130" text-anchor="middle" fill="#6b7280" font-family="Arial" font-size="12">Video Unavailable</text>
</svg>
