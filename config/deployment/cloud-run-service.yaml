# Cloud Run Service Configuration
# Use this with: gcloud run services replace cloud-run-service.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mtcat-next
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        autoscaling.knative.dev/minScale: '0'
        run.googleapis.com/cpu-throttling: 'true'
        run.googleapis.com/memory: '2Gi'
        run.googleapis.com/cpu: '2'
        run.googleapis.com/timeout: '300s'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/mtcat-next:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '8080'
          resources:
            limits:
              cpu: '2000m'
              memory: '2Gi'
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
